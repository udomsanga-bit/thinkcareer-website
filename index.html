// Simple context-free hook via a global store
window.TC_LANG = (function() {
  const listeners = new Set();
  // Reading localStorage can throw SecurityError in opaque-origin contexts
  // (file://, private mode, sandboxed iframes, some browsers). Guard it.
  let current = 'en';
  try {
    if (typeof localStorage !== 'undefined') {
      const stored = localStorage.getItem('tc-lang');
      if (stored) current = stored;
    }
  } catch (e) { /* opaque origin / private mode — ignore */ }
  return {
    get: () => current,
    set: (lang) => {
      current = lang;
      try { localStorage.setItem('tc-lang', lang); } catch (e) {}
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('data-lang', lang);
      listeners.forEach(fn => fn(lang));
    },
    subscribe: (fn) => { listeners.add(fn); return () => listeners.delete(fn); },
    t: (key) => (window.TC_I18N[current] && window.TC_I18N[current][key]) || window.TC_I18N.en[key] || key,
  };
})();

// React hook
window.useLang = function useLang() {
  const [, force] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => window.TC_LANG.subscribe(() => force()), []);
  return {
    lang: window.TC_LANG.get(),
    t: window.TC_LANG.t,
    setLang: window.TC_LANG.set,
  };
};

// ─────────────────────────────────────────────────────────────────────────────

function Contact() {
  const { t } = window.useLang();
  const [step, setStep] = useStateC(0);
  const [form, setForm] = useStateC({ name:"", email:"", stage:"", tier:"", goal:"", consent:false });
  const [errors, setErrors] = useStateC({});
  const [touched, setTouched] = useStateC({});
  const [submitting, setSubmitting] = useStateC(false);
  const [submitError, setSubmitError] = useStateC("");

  const stages = [t("stage_1"), t("stage_2"), t("stage_3"), t("stage_4"), t("stage_5")];
  const tiers = [t("tier_pick_1"), t("tier_pick_2"), t("tier_pick_3"), t("tier_pick_4")];

  const validate = (f) => {
    const e = {};
    if (!f.name.trim() || f.name.trim().length < 2) e.name = t("err_name");
    if (!f.email.trim()) e.email = t("err_email_required");
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)) e.email = t("err_email_invalid");
    if (!f.stage) e.stage = t("err_stage");
    if (!f.tier) e.tier = t("err_tier");
    if (!f.goal.trim() || f.goal.trim().length < 12) e.goal = t("err_goal");
    if (!f.consent) e.consent = t("err_consent");
    return e;
  };

  const set = (k, v) => {
    const next = { ...form, [k]: v };
    setForm(next);
    if (touched[k]) setErrors(validate(next));
  };
  const blur = (k) => { setTouched({ ...touched, [k]: true }); setErrors(validate(form)); };
  const submit = async (ev) => {
    ev.preventDefault();
    const e = validate(form);
    setErrors(e);
    setTouched({ name:true, email:true, stage:true, tier:true, goal:true, consent:true });
    if (Object.keys(e).length > 0) return;

    setSubmitting(true);
    setSubmitError("");
    try {
      const res = await fetch(FORMSPREE_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({
          name: form.name,
          email: form.email,
          career_stage: form.stage,
          program: form.tier,
          message: form.goal,
        }),
      });
      if (res.ok) {
        setStep(1);
      } else {
        const data = await res.json().catch(() => ({}));
        setSubmitError(data.error || "Something went wrong. Please try again.");
      }
    } catch (err) {
      setSubmitError("Could not send — please check your connection and try again.");
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <section className="tc-contact" id="contact">
      <div className="tc-contact__grid">
        <div className="tc-contact__copy">
          <div className="tc-eyebrow"><span className="tc-eyebrow__dot" />{t("contact_eyebrow")}</div>
          <h2 className="tc-h2">{t("contact_h2")}</h2>
          <p className="tc-contact__lede">{t("contact_lede")}</p>

          <ul className="tc-contact__promise">
            <li><span>01</span><p>{t("promise_1")}</p></li>
            <li><span>02</span><p>{t("promise_2")}</p></li>
            <li><span>03</span><p>{t("promise_3")}</p></li>
          </ul>

          <div className="tc-contact__alt">
            <div>
              <span className="tc-contact__alt-label">{t("alt_linkedin")}</span>
              <a href="https://www.linkedin.com/company/thinkcareer/" target="_blank" rel="noreferrer">/company/thinkcareer</a>
            </div>
            <div>
              <span className="tc-contact__alt-label">{t("alt_telegram")}</span>
              <a href="https://t.me/thinkofyourcareer" target="_blank" rel="noreferrer">{t("alt_telegram_val")}</a>
            </div>
          </div>
        </div>

        <form className="tc-form" onSubmit={submit} noValidate aria-live="polite">
          {step === 0 && (
            <>
              <div className="tc-form__row">
                <label className={`tc-field ${errors.name && touched.name ? "has-error" : ""}`}>
                  <span className="tc-field__label">{t("form_name")}</span>
                  <input type="text" value={form.name} onChange={(e) => set("name", e.target.value)} onBlur={() => blur("name")} placeholder={t("form_name_ph")} autoComplete="name" />
                  {errors.name && touched.name && <span className="tc-field__err">{errors.name}</span>}
                </label>
                <label className={`tc-field ${errors.email && touched.email ? "has-error" : ""}`}>
                  <span className="tc-field__label">{t("form_email")}</span>
                  <input type="email" value={form.email} onChange={(e) => set("email", e.target.value)} onBlur={() => blur("email")} placeholder={t("form_email_ph")} autoComplete="email" />
                  {errors.email && touched.email && <span className="tc-field__err">{errors.email}</span>}
                </label>
              </div>

              <fieldset className={`tc-field ${errors.stage && touched.stage ? "has-error" : ""}`}>
                <legend className="tc-field__label">{t("form_stage")}</legend>
                <div className="tc-chips">
                  {stages.map((s) => (
                    <button type="button" key={s} className={`tc-chip ${form.stage === s ? "is-on" : ""}`} onClick={() => { set("stage", s); blur("stage"); }}>{s}</button>
                  ))}
                </div>
                {errors.stage && touched.stage && <span className="tc-field__err">{errors.stage}</span>}
              </fieldset>

              <fieldset className={`tc-field ${errors.tier && touched.tier ? "has-error" : ""}`}>
                <legend className="tc-field__label">{t("form_tier")}</legend>
                <div className="tc-chips">
                  {tiers.map((s) => (
                    <button type="button" key={s} className={`tc-chip ${form.tier === s ? "is-on" : ""}`} onClick={() => { set("tier", s); blur("tier"); }}>{s}</button>
                  ))}
                </div>
                {errors.tier && touched.tier && <span className="tc-field__err">{errors.tier}</span>}
              </fieldset>

              <label className={`tc-field ${errors.goal && touched.goal ? "has-error" : ""}`}>
                <span className="tc-field__label">
                  {t("form_goal")}
                  <span className="tc-field__hint">{t("form_goal_hint")}</span>
                </span>
                <textarea rows={5} value={form.goal} onChange={(e) => set("goal", e.target.value)} onBlur={() => blur("goal")} placeholder={t("form_goal_ph")} />
                <span className="tc-field__count">{form.goal.length} {t("form_char")}</span>
                {errors.goal && touched.goal && <span className="tc-field__err">{errors.goal}</span>}
              </label>

              <label className={`tc-consent ${errors.consent && touched.consent ? "has-error" : ""}`}>
                <input type="checkbox" checked={form.consent} onChange={(e) => { set("consent", e.target.checked); blur("consent"); }} />
                <span>{t("form_consent")}</span>
              </label>
              {errors.consent && touched.consent && <span className="tc-field__err tc-field__err--block">{errors.consent}</span>}

              {submitError && <p className="tc-field__err" style={{marginBottom:"0.5rem"}}>{submitError}</p>}
              <button type="submit" className="tc-btn tc-btn--primary tc-btn--block" disabled={submitting}>
                {submitting ? "Sending…" : <>{t("form_send")}<span aria-hidden>→</span></>}
              </button>
              <p className="tc-form__fineprint">{t("form_fineprint")}</p>
            </>
          )}

          {step === 1 && (
            <div className="tc-form__thanks" role="status">
              <div className="tc-form__thanks-mark" aria-hidden>✓</div>
              <h3>{t("thanks_pre")}{form.name.split(" ")[0]}.</h3>
              <p>{t("thanks_body")}</p>
              <ul>
                <li>{t("thanks_1")}</li>
                <li>{t("thanks_2")}</li>
              </ul>
              <p className="tc-form__signoff">{t("thanks_signoff")}</p>
              <button type="button" className="tc-btn tc-btn--ghost" onClick={() => { setStep(0); setForm({ name:"", email:"", stage:"", tier:"", goal:"", consent:false }); setErrors({}); setTouched({}); }}>
                {t("thanks_again")}
              </button>
            </div>
          )}
        </form>
      </div>
    </section>
  );
}

// === Tweaks ===

// Tweaks panel — toggles palette / headline / density live
const { useState: useStateT, useEffect: useEffectT } = React;

function TweaksPanel({ state, setState }) {
  const { t } = window.useLang();
  const [available, setAvailable] = useStateT(false);
  const [shown, setShown] = useStateT(false);

  useEffectT(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setShown(true);
      if (d.type === "__deactivate_edit_mode") setShown(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    setAvailable(true);
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const update = (patch) => {
    const next = { ...state, ...patch };
    setState(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
  };

  if (!shown) return null;

  return (
    <aside className="tc-tweaks" role="dialog" aria-label="Tweaks">
      <div className="tc-tweaks__head">
        <span className="tc-eyebrow">
          <span className="tc-eyebrow__dot" />
          Tweaks
        </span>
        {/* title stays EN — toolbar label is fixed */}
        <button className="tc-tweaks__close" onClick={() => setShown(false)} aria-label="Close">×</button>
      </div>

      <div className="tc-tweaks__group">
        <label className="tc-tweaks__label">{t("tw_palette")}</label>
        <div className="tc-tweaks__swatches">
          {Object.entries(window.TC_PALETTES).map(([key, p]) => (
            <button
              key={key}
              className={`tc-tweaks__swatch ${state.palette === key ? "is-on" : ""}`}
              onClick={() => update({ palette: key })}
              title={p.name}
            >
              <span style={{ background: p.navy }} />
              <span style={{ background: p.sage }} />
              <span style={{ background: p.cream }} />
              <em>{p.name}</em>
            </button>
          ))}
        </div>
      </div>

      <div className="tc-tweaks__group">
        <label className="tc-tweaks__label">{t("tw_headline")}</label>
        <div className="tc-tweaks__stack">
          {[0,1,2].map((i) => (
            <button
              key={i}
              className={`tc-tweaks__opt ${state.headlineIndex === i ? "is-on" : ""}`}
              onClick={() => update({ headlineIndex: i })}
            >
              <span className="tc-tweaks__opt-n">{String(i+1).padStart(2,"0")}</span>
              <span className="tc-tweaks__opt-t">{t(`headline_${i+1}_title`)}</span>
            </button>
          ))}
        </div>
      </div>

      <div className="tc-tweaks__group">
        <label className="tc-tweaks__label">{t("tw_density")}</label>
        <div className="tc-tweaks__segmented">
          {[["spacious",t("tw_density_1")],["standard",t("tw_density_2")],["compact",t("tw_density_3")]].map(([d,label]) => (
            <button
              key={d}
              className={`tc-tweaks__seg ${state.density === d ? "is-on" : ""}`}
              onClick={() => update({ density: d })}
            >{label}</button>
          ))}
        </div>
      </div>

      <div className="tc-tweaks__group">
        <label className="tc-tweaks__label">{t("tw_heading_font")}</label>
        <div className="tc-tweaks__segmented">
          {[
            ["serif", "Instrument Serif"],
            ["display", "Fraunces"],
            ["sans", "Inter Tight"],
          ].map(([key, name]) => (
            <button
              key={key}
              className={`tc-tweaks__seg ${state.headingFont === key ? "is-on" : ""}`}
              onClick={() => update({ headingFont: key })}
            >{name}</button>
          ))}
        </div>
      </div>
    </aside>
  );
}



// === App glue ===
function applyPalette(key) {
  const p = window.TC_PALETTES[key] || window.TC_PALETTES.heritage;
  const root = document.documentElement;
  root.style.setProperty("--navy", p.navy);
  root.style.setProperty("--navy-deep", p.navyDeep);
  root.style.setProperty("--sage", p.sage);
  root.style.setProperty("--sage-deep", p.sageDeep);
  root.style.setProperty("--cream", p.cream);
  root.style.setProperty("--cream-deep", p.creamDeep);
  root.style.setProperty("--ink", p.ink);
  root.style.setProperty("--gold", p.gold);
  root.style.setProperty("--muted", p.muted);
}

function App() {
  const [state, setState] = useState(window.TC_TWEAK_DEFAULTS);

  useEffect(() => {
    applyPalette(state.palette);
    document.documentElement.setAttribute("data-density", state.density);
    document.documentElement.setAttribute("data-heading-font", state.headingFont);
    document.documentElement.setAttribute("lang", window.TC_LANG.get());
    document.documentElement.setAttribute("data-lang", window.TC_LANG.get());
  }, [state.palette, state.density, state.headingFont]);

  return (
    <>
      <Nav />
      <main>
        <Hero headlineIndex={state.headlineIndex} />
        <CVBuilderBanner />
        <Why />
        <About />
        <Services />
        <Contact />
        <FAQ />
      </main>
      <Footer />
      <TweaksPanel state={state} setState={setState} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
